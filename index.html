<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="iNav - 轻量优雅的个人导航站，快速访问常用链接、书签管理与搜索" />
    <meta name="theme-color" content="#0064d1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2997ff" media="(prefers-color-scheme: dark)" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="iNav" />
    <meta name="keywords" content="导航站,书签,快速访问,个人主页,nav,bookmarks" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="iNav - 个人导航站" />
    <meta property="og:description" content="轻量优雅的个人导航站，快速访问常用链接、书签管理与搜索" />
    <meta property="og:site_name" content="iNav" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="iNav - 个人导航站" />
    <meta name="twitter:description" content="轻量优雅的个人导航站，快速访问常用链接、书签管理与搜索" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- favicon 代理预连接 -->
    <link rel="dns-prefetch" href="https://ico.dogxi.me" />
    <link rel="preconnect" href="https://ico.dogxi.me" crossorigin />

    <title>iNav - 个人导航站</title>

    <!-- 骨架屏内联样式，首帧即可绘制，避免白屏 -->
    <style>
      :root {
        color-scheme: light dark;
      }

      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          system-ui, sans-serif;
        background-color: #f5f5f7;
        color: #1d1d1f;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      [data-theme="dark"] body {
        background-color: #0d0d0d;
        color: #f5f5f5;
      }

      #root {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
      }

      #shell-header {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 48px;
        border-bottom: 1px solid #e5e5e7;
        background-color: rgba(245, 245, 247, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        padding: 0 1rem;
        gap: 0.5rem;
        flex-shrink: 0;
      }

      [data-theme="dark"] #shell-header {
        border-bottom-color: #2c2c2e;
        background-color: rgba(13, 13, 13, 0.85);
      }

      #shell-logo {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background-color: #e5e5e7;
        flex-shrink: 0;
      }

      [data-theme="dark"] #shell-logo {
        background-color: #2c2c2e;
      }

      #shell-search {
        flex: 1;
        height: 32px;
        border-radius: 8px;
        border: 1px solid #e5e5e7;
        background-color: #ffffff;
        margin: 0 0.5rem;
      }

      [data-theme="dark"] #shell-search {
        border-color: #2c2c2e;
        background-color: #161616;
      }

      #shell-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }

      .shell-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background-color: #e5e5e7;
        flex-shrink: 0;
      }

      [data-theme="dark"] .shell-btn {
        background-color: #2c2c2e;
      }

      #shell-main {
        flex: 1;
        padding: 0.75rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-width: 1280px;
        width: 100%;
        margin: 0 auto;
        box-sizing: border-box;
      }

      #shell-cats {
        display: flex;
        gap: 0.5rem;
        overflow: hidden;
      }

      .shell-cat {
        height: 24px;
        border-radius: 9999px;
        background-color: #e5e5e7;
        flex-shrink: 0;
      }

      [data-theme="dark"] .shell-cat {
        background-color: #2c2c2e;
      }

      #shell-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      @media (min-width: 640px) {
        #shell-main { padding: 0.75rem 1.5rem; }
        #shell-grid { grid-template-columns: repeat(2, 1fr); }
      }

      @media (min-width: 1024px) {
        #shell-grid { grid-template-columns: repeat(3, 1fr); }
      }

      @media (min-width: 1280px) {
        #shell-grid { grid-template-columns: repeat(4, 1fr); }
      }

      .shell-card {
        height: 100px;
        border-radius: 8px;
        border: 1px solid #e5e5e7;
        /* shimmer animation */
        background: linear-gradient(
          90deg,
          #f0f0f2 25%,
          #e5e5e7 50%,
          #f0f0f2 75%
        );
        background-size: 200% 100%;
        animation: shell-shimmer 1.4s ease-in-out infinite;
      }

      [data-theme="dark"] .shell-card {
        border-color: #2c2c2e;
        background: linear-gradient(
          90deg,
          #1c1c1e 25%,
          #252528 50%,
          #1c1c1e 75%
        );
        background-size: 200% 100%;
      }

      @keyframes shell-shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* main.tsx 挂载后移除骨架，此规则作为兜底 */
      #root.app-ready #shell-header,
      #root.app-ready #shell-main {
        display: none;
      }
    </style>

    <!-- 主题检测：首帧前同步读取 localStorage，避免主题闪烁 -->
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('inav-theme');
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme =
            stored || (prefersDark ? 'dark' : 'light');
        } catch (_e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root" class="min-h-screen bg-background text-foreground">
      <div id="shell-header" aria-hidden="true">
        <div id="shell-logo"></div>
        <div id="shell-search"></div>
        <div id="shell-actions">
          <div class="shell-btn"></div>
          <div class="shell-btn"></div>
          <div class="shell-btn"></div>
        </div>
      </div>

      <div id="shell-main" aria-hidden="true">
        <div id="shell-cats">
          <div class="shell-cat" style="width:48px"></div>
          <div class="shell-cat" style="width:56px"></div>
          <div class="shell-cat" style="width:44px"></div>
          <div class="shell-cat" style="width:60px"></div>
          <div class="shell-cat" style="width:40px"></div>
          <div class="shell-cat" style="width:52px"></div>
        </div>

        <div id="shell-grid">
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
